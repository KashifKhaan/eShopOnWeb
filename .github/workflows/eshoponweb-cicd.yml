name: eShopOnWeb Build and Test

#Triggers
on: workflow_dispatch

#Environment variables
env:
  RESOURCE-GROUP: rg-eshoponweb-centralus
  LOCATION: centralus  # Changed to match RG for better SKU availability
  TEMPLATE-FILE: infra/webapp.bicep
  SUBSCRIPTION-ID: a9c93a2d-56bc-45ad-a175-cf94cd62aa83
  WEBAPP-NAME: devops-webapp-centralus-800015217

# ... (buildandtest job stays the same)

  deploy:
    runs-on: ubuntu-latest
    needs: buildandtest
    environment:
      name: "Development"
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v5 # Changed v6 to v5 to match upload
        with:
          name: .net-app
          path: .net-app

      - name: Download artifact from build job
        uses: actions/download-artifact@v5 # Changed v6 to v5 to match upload
        with:
          name: bicep-template
          path: bicep-template
# ... (rest of the file)
